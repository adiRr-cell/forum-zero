<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fórum Zero – WHS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none}
body.su{cursor:default}
#si{width:100vw;height:100vh;object-fit:contain;position:absolute;top:0;left:0;background:#111}
#ui{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .3s;z-index:10}
body.su #ui{opacity:1;pointer-events:auto}
.ar{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:2.5rem;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ar:hover{background:rgba(0,100,200,.75)}
#bp{left:24px}#bn{right:24px}
#tb{position:absolute;top:0;left:0;right:0;height:56px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
#ctr{color:#fff;font-size:1.1rem;font-weight:bold}
#ttl{color:#ddd;font-size:.85rem}
#bfs{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:1rem;padding:4px 10px;border-radius:6px;cursor:pointer}
#bb{position:absolute;bottom:0;left:0;right:0;height:72px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);display:flex;align-items:center;justify-content:center;gap:16px;padding:0 100px}
#ts{display:flex;gap:6px;overflow-x:auto;max-width:70vw;scrollbar-width:none}
#ts::-webkit-scrollbar{display:none}
.th{flex-shrink:0;width:72px;height:40px;object-fit:cover;border-radius:4px;border:2px solid transparent;cursor:pointer;opacity:.6}
.th:hover{opacity:1}.th.active{border-color:#4da6ff;opacity:1}
#bpl{flex-shrink:0;background:rgba(0,120,255,.8);border:2px solid rgba(255,255,255,.4);color:#fff;font-size:1.4rem;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
#pw{position:fixed;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.15);z-index:20}
#pb{height:100%;background:#4da6ff;width:0%;transition:width linear}
#bdg{position:fixed;bottom:12px;right:18px;color:rgba(255,255,255,.35);font-size:.78rem;pointer-events:none;z-index:5}
#tst{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:8px 20px;border-radius:20px;font-size:.9rem;pointer-events:none;opacity:0;transition:opacity .4s;z-index:30}
#tst.show{opacity:1}
</style></head>
<body>
<img id="si" alt="" draggable="false">
<div id="ui">
  <div id="tb"><span id="ctr">1/36</span><span id="ttl">Fórum Zero – WHS</span><button id="bfs">⛶ Tela cheia</button></div>
  <button class="ar" id="bp">&#8592;</button>
  <button class="ar" id="bn">&#8594;</button>
  <div id="bb"><button id="bpl">⏸</button><div id="ts"></div></div>
</div>
<div id="pw"><div id="pb"></div></div>
<div id="bdg">1/36</div>
<div id="tst"></div>
<script>
const T=36,IV=10000;
const U=Array.from({length:T},(_,i)=>'https://adirr-cell.github.io/forum-zero/slides/slide_'+(i+1).toString().padStart(2,'0')+'.jpg');
let C=0,P=true,tmr=null,ut=null;
const si=document.getElementById('si'),ctr=document.getElementById('ctr');
const bdg=document.getElementById('bdg'),ts=document.getElementById('ts');
const bpl=document.getElementById('bpl'),pb=document.getElementById('pb');
const tst=document.getElementById('tst');

// Thumbnails
U.forEach((url,i)=>{
  const t=document.createElement('img');
  t.src=url;
  t.className='th'+(i===0?' active':'');
  t.addEventListener('click',()=>gt(i));
  ts.appendChild(t);
});

// Inicia quando primeiro slide carregar
si.onload=()=>{
  if(C===0&&P) sa();
};
si.onerror=()=>{
  // Tenta de novo em 2s
  setTimeout(()=>{si.src=U[C]+'?t='+Date.now();},2000);
};

// Mostrar primeiro slide
si.src=U[0];
ctr.textContent='1/'+T;
bdg.textContent='1/'+T;

// Preload próximos 5
function preload(from){
  for(let i=from;i<Math.min(from+5,T);i++){
    new Image().src=U[i];
  }
}
preload(1);

function gt(n){
  C=((n%T)+T)%T;
  si.src=U[C];
  preload(C+1);
  const l=(C+1)+'/'+T;
  ctr.textContent=l;bdg.textContent=l;
  document.querySelectorAll('.th').forEach((t,i)=>t.classList.toggle('active',i===C));
  const a=ts.querySelectorAll('.th')[C];
  if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  if(P)sa();
}

function sa(){
  clearInterval(tmr);
  pb.style.transition='none';pb.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    pb.style.transition='width '+IV+'ms linear';
    pb.style.width='100%';
  }));
  tmr=setInterval(()=>gt(C+1),IV);
}
function stp(){clearInterval(tmr);pb.style.transition='none';pb.style.width='0%';}
function setP(v){P=v;bpl.textContent=v?'⏸':'▶';v?sa():stp();shT(v?'▶ Autoplay':'⏸ Pausado');}
function shT(m){tst.textContent=m;tst.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>tst.classList.remove('show'),1800);}
function eFS(){const e=document.documentElement;if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen();}
function tFS(){if(!document.fullscreenElement&&!document.webkitFullscreenElement)eFS();else if(document.exitFullscreen)document.exitFullscreen();}
document.getElementById('bfs').addEventListener('click',tFS);
document.getElementById('bp').addEventListener('click',()=>gt(C-1));
document.getElementById('bn').addEventListener('click',()=>gt(C+1));
bpl.addEventListener('click',()=>setP(!P));
function shUI(){document.body.classList.add('su');clearTimeout(ut);ut=setTimeout(()=>document.body.classList.remove('su'),3500);}
document.addEventListener('mousemove',shUI);
document.addEventListener('touchstart',shUI);
document.addEventListener('keydown',e=>{
  shUI();
  switch(e.key){
    case'ArrowRight':case'PageDown':e.preventDefault();gt(C+1);break;
    case'ArrowLeft':case'PageUp':e.preventDefault();gt(C-1);break;
    case' ':e.preventDefault();setP(!P);break;
    case'f':case'F':tFS();break;
  }
});
let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  if(tx===null)return;
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?gt(C+1):gt(C-1);}
  tx=null;
});
<\/script></body></html>
